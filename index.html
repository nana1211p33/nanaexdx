<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>大日本帝國廻転抽籤器</title>
<style>
/* ══════════════════════════════════════════════════
   CSS変数 - すべてvh/vw/clampベース
══════════════════════════════════════════════════ */
:root {
    --cream: #f5e6c8;
    --dark:  #1a0800;
    --header-h: clamp(36px, 5vh, 56px);
    --topbar-h: clamp(32px, 4.5vh, 48px);
    --chrome-h: calc(var(--header-h) + var(--topbar-h));
}

*, *::before, *::after { box-sizing: border-box; }

html {
    /* デフォルト縮度150% */
    zoom: 0.8
}

html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', '游明朝', serif;
    color: var(--cream);
    background: #0a0000;
}

/* ══════════ 背景動画 ══════════ */
#bg-video, #omi-video {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
}
#bg-video  { z-index: 0; }
#omi-video { z-index: 9999; display: none; }

/* ══════════ ヘッダー ══════════ */
.jp-header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: linear-gradient(90deg, #2a0000, #5a0000, #7a0000, #5a0000, #2a0000);
    z-index: 200; overflow: hidden;
    box-shadow: 0 3px 16px rgba(139,0,0,.95);
    border-bottom: 2px solid rgba(255,255,255,.5);
    display: flex; align-items: center;
}
.scrolling-text {
    display: flex; white-space: nowrap;
    animation: scroll-right 30s linear infinite;
}
@keyframes scroll-right {
    0%   { transform: translateX(-50%); }
    100% { transform: translateX(0); }
}
.scrolling-text span {
    font-size: clamp(.7rem, 1.6vh, 1.3rem);
    font-weight: bold; color: #fff;
    text-shadow: 1px 1px 5px rgba(0,0,0,.9);
    padding: 0 40px; letter-spacing: 4px;
}

/* ══════════ ヘッダー右ボタン ══════════ */
.header-buttons {
    position: fixed; top: 0; right: 0;
    height: var(--header-h);
    display: flex; align-items: center;
    z-index: 201;
}
.header-icon-btn {
    background: transparent; color: #fff; border: none;
    width: clamp(36px,4vh,48px); height: var(--header-h);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: clamp(1rem,1.8vh,1.4rem);
    transition: background .18s;
}
.header-icon-btn:hover { background: rgba(255,255,255,.12); }

.hamburger-btn {
    background: transparent; border: none;
    width: clamp(40px,4.5vh,52px); height: var(--header-h);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(4px,0.6vh,6px);
    cursor: pointer; padding: 0;
    transition: background .18s;
}
.hamburger-btn:hover { background: rgba(255,255,255,.12); }
.hamburger-btn span {
    display: block; width: 20px; height: 2px;
    background: #fff; border-radius: 2px; transition: all .3s;
}
.hamburger-btn.active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger-btn.active span:nth-child(2) { opacity: 0; }
.hamburger-btn.active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

/* ══════════ トップバー ══════════ */
.top-bar {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: var(--topbar-h);
    background: rgba(0,0,0,.5);
    border-bottom: 1px solid rgba(255,255,255,.15);
    z-index: 199;
    display: flex; align-items: center;
    gap: clamp(6px,1vw,14px);
    padding: 0 clamp(6px,1vw,14px);
    overflow-x: auto;
    scrollbar-width: none;
}
.top-bar::-webkit-scrollbar { display: none; }
.top-bar-btn {
    background: rgba(90,0,0,.88); color: #fff;
    border: 1.5px solid rgba(255,255,255,.6);
    padding: 3px 10px; border-radius: 4px;
    cursor: pointer; font-size: clamp(.7rem,1.4vh,1rem);
    font-weight: bold; font-family: inherit;
    white-space: nowrap; transition: all .2s; flex-shrink: 0;
}
.top-bar-btn:hover { background: rgba(140,0,0,1); }
.top-bar-btn.active { background: rgba(40,30,0,.9); border-color: #fff; }

/* ══════ トグルボタン（名言・解説オンオフ）══════ */
.toggle-group {
    display: flex; align-items: center;
    gap: 4px; flex-shrink: 0;
    background: rgba(20,0,0,.75);
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 5px;
    padding: 2px 6px;
    height: calc(var(--topbar-h) - 8px);
}
.toggle-group-label {
    font-size: clamp(.55rem,1.1vh,.75rem);
    color: rgba(255,255,255,.6);
    white-space: nowrap;
    padding-right: 4px;
    border-right: 1px solid rgba(255,255,255,.2);
    margin-right: 2px;
    letter-spacing: 1px;
}
.toggle-btn {
    background: rgba(60,0,0,.8); color: rgba(255,255,255,.7);
    border: 1px solid rgba(255,255,255,.4);
    padding: 2px 8px; border-radius: 3px;
    cursor: pointer; font-size: clamp(.6rem,1.2vh,.8rem);
    font-weight: bold; font-family: inherit;
    white-space: nowrap; transition: all .2s; flex-shrink: 0;
    letter-spacing: 1px;
}
.toggle-btn:hover { background: rgba(110,0,0,.9); color: #fff; }
.toggle-btn.off {
    background: rgba(15,10,5,.9);
    color: rgba(255,255,255,.3);
    border-color: rgba(255,255,255,.2);
    text-decoration: line-through;
}

.vol-row, .spd-row {
    display: flex; align-items: center;
    gap: 5px; flex-shrink: 0;
}
.vol-row span, .spd-row span {
    font-size: clamp(.6rem,1.3vh,.85rem); color: #fff; white-space: nowrap;
}
.top-bar input[type=range] {
    width: clamp(50px,7vw,100px); height: 4px; cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,.3); border-radius: 3px; outline: none;
}
.top-bar input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px;
    background: #fff; border-radius: 50%; cursor: pointer;
}

/* ══════════ サイドパネル共通 ══════════ */
.side-panel {
    position: fixed; top: 0; right: 0;
    width: min(420px, 92vw);
    height: 100vh; height: 100dvh;
    background: rgba(6,1,0,.97);
    border-left: 2px solid rgba(255,255,255,.4);
    z-index: 300;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    overflow: hidden;
}
.side-panel.show { transform: translateX(0); }

.panel-head {
    flex-shrink: 0;
    padding: 10px 16px;
    background: rgba(20,0,0,.98);
    border-bottom: 1px solid rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: space-between;
}
.panel-head-title {
    color: #fff; font-size: clamp(.85rem,1.5vh,1.1rem);
    font-weight: bold; letter-spacing: 3px;
}
.panel-close-x {
    background: transparent; border: 1.5px solid rgba(255,255,255,.5);
    color: #fff; width: 30px; height: 30px; border-radius: 50%;
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; font-family: sans-serif; line-height: 1;
}
.panel-close-x:hover { background: rgba(255,255,255,.15); transform: rotate(90deg); }

.panel-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.2) transparent;
}
.panel-body::-webkit-scrollbar { width: 5px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 3px; }

.menu-section, .settings-section {
    margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,.2);
}
.menu-section:last-child, .settings-section:last-child { border-bottom: none; }
.menu-title, .settings-title {
    color: #fff; font-size: clamp(.85rem,1.5vh,1.1rem);
    font-weight: bold; margin-bottom: 8px; letter-spacing: 3px;
}
.menu-text { color: var(--cream); font-size: clamp(.75rem,1.3vh,.9rem); line-height: 1.8; margin-bottom: 5px; }
.menu-label, .settings-label {
    color: var(--cream); font-size: clamp(.75rem,1.3vh,.9rem);
    margin-bottom: 4px; display: block;
}
.menu-input, .menu-textarea, .settings-input {
    width: 100%; padding: 7px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,.4);
    background: rgba(255,255,255,.06);
    color: var(--cream); font-size: clamp(.75rem,1.3vh,.9rem);
    margin-bottom: 7px; font-family: inherit;
}
.menu-textarea { min-height: 80px; resize: vertical; }
.menu-btn, .add-item-btn, .reset-btn {
    width: 100%; background: rgba(90,0,0,.8);
    color: #fff; border: 1px solid rgba(255,255,255,.4);
    padding: 8px; border-radius: 3px; cursor: pointer;
    font-weight: bold; font-size: clamp(.8rem,1.4vh,.95rem);
    margin-top: 7px; font-family: inherit; letter-spacing: 2px; transition: background .2s;
}
.menu-btn:hover, .add-item-btn:hover { background: rgba(140,0,0,1); }
.reset-btn { background: rgba(50,0,0,.8); }
.reset-btn:hover { background: rgba(100,0,0,1); }
.settings-file-label {
    display: block; background: rgba(90,0,0,.8);
    color: #fff; padding: 7px; border-radius: 3px;
    text-align: center; cursor: pointer;
    border: 1px solid rgba(255,255,255,.4); margin-bottom: 7px;
    font-weight: bold; letter-spacing: 2px;
    font-size: clamp(.75rem,1.3vh,.9rem);
    transition: background .2s;
}
.settings-file-label:hover { background: rgba(140,0,0,1); }
.settings-file-input { display: none; }
.item-list { max-height: 36vh; overflow-y: auto; margin-bottom: 7px; }
.item-entry {
    background: rgba(90,0,0,.35); padding: 9px;
    margin-bottom: 7px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,.25);
}
.item-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.item-remove {
    background: #4a0000; color: #fff;
    border: none; padding: 3px 9px; border-radius: 3px;
    cursor: pointer; font-weight: bold; font-size: .8rem;
}
.item-remove:hover { background: #8b0000; }
.color-picker-wrapper { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.color-picker { width: 42px; height: 28px; border: 1px solid rgba(255,255,255,.4); border-radius: 3px; cursor: pointer; }

/* ══════════ 起動ポップアップ ══════════ */
.startup-quote {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(4,0,0,.98), rgba(0,0,0,.99));
    z-index: 2000;
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: clamp(20px,4vw,60px);
    opacity: 1; transition: opacity 1.2s ease;
    /* スキャンライン古めかしいエフェクト */
    overflow: hidden;
}
.startup-quote::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.18) 2px,
        rgba(0,0,0,.18) 4px
    );
    pointer-events: none; z-index: 1;
    animation: scanlines-move 8s linear infinite;
}
.startup-quote::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.55) 100%);
    pointer-events: none; z-index: 2;
}
@keyframes scanlines-move {
    0%   { background-position: 0 0; }
    100% { background-position: 0 40px; }
}
.startup-quote.fade-out { opacity: 0; pointer-events: none; }

/* テキストラッパー: z-index で scanlines の上に */
.startup-quote-inner {
    position: relative; z-index: 5;
    display: flex; flex-direction: row;
    align-items: center;
    gap: clamp(20px,4vw,60px);
}

.startup-quote-text {
    color: #fff; font-weight: bold;
    font-size: clamp(1.2rem, 3.2vh, 2.4rem);
    text-shadow: 0 0 20px rgba(255,200,100,.35), 0 0 8px rgba(255,100,0,.2), 2px 2px 8px rgba(0,0,0,1);
    line-height: 2.1; letter-spacing: 5px;
    writing-mode: vertical-rl; text-orientation: mixed;
    max-height: 75vh;
    /* タイプライター開始前は非表示 */
    opacity: 1;
    /* ちらつきエフェクト */
    animation: flicker-text 4s ease-in-out infinite alternate;
}
.startup-quote-author {
    color: var(--cream);
    font-size: clamp(.7rem, 1.6vh, 1.1rem);
    letter-spacing: 3px;
    writing-mode: vertical-rl; text-orientation: mixed;
    opacity: 0;
    text-shadow: 0 0 10px rgba(255,200,100,.3);
}
.startup-quote-author.show {
    animation: fadeInAuthor .8s ease forwards;
}
@keyframes fadeInAuthor {
    from { opacity: 0; filter: blur(3px); }
    to   { opacity: 1; filter: blur(0); }
}
@keyframes flicker-text {
    0%,100% { text-shadow: 0 0 20px rgba(255,200,100,.35), 0 0 8px rgba(255,100,0,.2), 2px 2px 8px rgba(0,0,0,1); }
    85%     { text-shadow: 0 0 30px rgba(255,220,120,.5), 0 0 12px rgba(255,120,0,.3), 2px 2px 8px rgba(0,0,0,1); }
    87%     { text-shadow: 0 0 4px rgba(255,200,100,.1), 2px 2px 8px rgba(0,0,0,1); }
    89%     { text-shadow: 0 0 30px rgba(255,220,120,.5), 0 0 12px rgba(255,120,0,.3), 2px 2px 8px rgba(0,0,0,1); }
}

/* タイプライター文字 各文字のspan */
.tw-char {
    display: inline;
    opacity: 0;
    animation: tw-appear .05s ease forwards;
}
@keyframes tw-appear {
    from { opacity: 0; filter: blur(2px) brightness(2); color: #ffddaa; }
    to   { opacity: 1; filter: blur(0) brightness(1); color: #ffffff; }
}

ruby { ruby-align: center; }
rt { font-size: .38em; letter-spacing: 1px; color: rgba(255,220,180,.9); font-weight: normal; }

/* ══════════════════════════════════════════════
   メインレイアウト
══════════════════════════════════════════════ */
.main-layout {
    position: fixed;
    top: var(--chrome-h);
    left: 0; right: 0;
    bottom: clamp(22px,3.5vh,32px);
    z-index: 1;

    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(8px,1.5vw,24px);
    padding: clamp(4px,.8vh,10px) clamp(6px,1vw,16px);
    overflow: hidden;
}

/* ── ルーレットゾーン ── */
.roulette-zone {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    position: relative;
}

.roulette-container {
    position: relative;
    width:  clamp(160px, min(38vw, 78vh - 90px), 420px);
    height: clamp(160px, min(38vw, 78vh - 90px), 420px);
    flex-shrink: 0;
}

#roulette {
    width: 100%; height: 100%;
    border-radius: 50%;
    border: clamp(3px,0.6vh,7px) solid rgba(255,255,255,.75);
    background: #1a0800;
    box-shadow: 0 0 28px rgba(255,255,255,.12), 0 0 55px rgba(139,0,0,.35);
    transition: transform 4s cubic-bezier(.15,0,.15,1);
    display: block;
}

/* ポインター: ルーレット右端に重ねて内側に配置 */
.character-pointer {
    position: absolute;
    top: 50%;
    /* ルーレット右端から内側に 12% 入り込む */
    left: calc(100% - 12%);
    /* ルーレット幅の 65% の大きさ */
    width:  clamp(90px, 65%, 280px);
    height: clamp(90px, 65%, 280px);
    transform: translateY(-50%);
    filter: drop-shadow(0 0 10px rgba(255,200,100,.5)) drop-shadow(2px 2px 4px rgba(0,0,0,.8));
    object-fit: contain;
    z-index: 11;
    transform-origin: center center;
    pointer-events: none;
}
@keyframes spin-cw {
    to { transform: translateY(-50%) rotate(360deg); }
}
.is-spinning { animation: spin-cw .15s linear infinite; }

/* ── 中央ゾーン: 名言+ボタン ── */
.quote-zone {
    flex: 1 1 0;
    min-width: 0;
    height: clamp(160px, min(38vw, 78vh - 90px), 420px);
    display: flex; flex-direction: column;
    gap: clamp(6px,1vh,14px);
}

.result-display {
    background: rgba(70,0,0,.92);
    padding: clamp(8px,1.5vh,20px) clamp(10px,1.5vw,22px);
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,.55);
    width: 100%;
    flex: 1; min-height: 0;
    opacity: 0; transition: opacity .5s;
    box-shadow: 0 0 22px rgba(255,255,255,.06);
    display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
}
.result-display.show { opacity: 1; }
/* 非表示状態 */
.result-display.hidden-panel {
    display: none !important;
}
.result-quote {
    color: #fff; font-size: clamp(.7rem,1.5vh,1.15rem);
    font-weight: bold; text-align: center;
    margin-bottom: clamp(4px,.8vh,10px);
    line-height: 1.7; letter-spacing: 1px; word-break: keep-all;
}
.result-author {
    color: var(--cream); font-size: clamp(.65rem,1.3vh,.95rem);
    text-align: center; letter-spacing: 2px;
}

#spin-btn {
    background: rgba(90,0,0,.92); color: #fff;
    border: 1.5px solid rgba(255,255,255,.7);
    padding: clamp(8px,1.4vh,16px) 0;
    font-size: clamp(.95rem,2vh,1.5rem); font-weight: bold;
    border-radius: 6px; cursor: pointer;
    font-family: inherit; letter-spacing: 5px;
    box-shadow: 0 3px 16px rgba(139,0,0,.6);
    transition: all .25s ease; width: 100%; flex-shrink: 0;
}
#spin-btn:hover { background: rgba(140,0,0,1); transform: scale(1.03); box-shadow: 0 0 24px rgba(255,255,255,.3); }
#spin-btn:active { transform: scale(.97); }
#spin-btn:disabled { background: #1a1200; box-shadow: none; cursor: not-allowed; color: #555; border-color: #333; }
#spin-btn:disabled:hover { background: #1a1200; transform: scale(1); }

/* ── 右ゾーン: 解説 ── */
.explanation-zone {
    flex-shrink: 0;
    width: clamp(100px, 16vw, 200px);
    height: clamp(160px, min(38vw, 78vh - 90px), 420px);
}
.explanation-display {
    background: rgba(50,0,0,.92);
    padding: clamp(8px,1.3vh,16px) clamp(8px,1.2vw,18px);
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,.45);
    width: 100%; height: 100%;
    opacity: 0; transition: opacity .5s;
    box-shadow: 0 0 16px rgba(255,255,255,.05);
    display: flex; flex-direction: column;
    overflow: hidden;
}
.explanation-display.show { opacity: 1; }
.explanation-display.hidden-panel {
    display: none !important;
}
.explanation-title {
    color: #fff; font-size: clamp(.7rem,1.3vh,.95rem);
    font-weight: bold; margin-bottom: clamp(5px,.9vh,10px);
    text-align: center; border-bottom: 1px solid rgba(255,255,255,.3);
    padding-bottom: 5px; letter-spacing: 3px; flex-shrink: 0;
}
.explanation-content {
    color: var(--cream); font-size: clamp(.6rem,1.15vh,.85rem);
    line-height: 1.9;
    writing-mode: vertical-rl; text-orientation: mixed;
    flex: 1; overflow-y: auto; letter-spacing: 1px; min-height: 0;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent;
}
.explanation-content::-webkit-scrollbar { width: 3px; }
.explanation-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); }

/* ── ヒント ── */
.f9-hint {
    position: fixed; bottom: clamp(3px,.6vh,8px); left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,.6); color: rgba(255,255,255,.6);
    border: 1px solid rgba(255,255,255,.2);
    padding: 2px 10px; border-radius: 12px;
    font-size: clamp(.55rem,1vh,.75rem); z-index: 50;
    pointer-events: none; letter-spacing: 2px; white-space: nowrap;
}

@media (max-width: 700px) {
    .explanation-zone { display: none; }
    .quote-zone { min-width: 120px; }
}
@media (max-width: 500px) {
    .top-bar-btn { font-size: .65rem; padding: 2px 7px; }
    .vol-row span, .spd-row span { display: none; }
}
</style>
</head>
<body>

<video id="bg-video" loop autoplay playsinline muted>
    <source src="dainiti.mp4" type="video/mp4">
</video>
<video id="omi-video" playsinline>
    <source src="omimusic.mp4" type="video/mp4">
</video>

<!-- ヘッダー -->
<div class="jp-header">
    <div class="scrolling-text" id="header-scroll">
        <span id="header-text-1">有ニ利勝ノ後最ニ忍堪　貫一誠至國報産生</span>
        <span id="header-text-2">有ニ利勝ノ後最ニ忍堪　貫一誠至國報産生</span>
    </div>
</div>

<!-- ヘッダー右ボタン -->
<div class="header-buttons">
    <button class="header-icon-btn" id="settings-toggle" title="設定">⚙</button>
    <button class="hamburger-btn" id="hamburger-toggle" title="メニュー">
        <span></span><span></span><span></span>
    </button>
</div>

/**
 * HTML文字列をパースして「ruby要素まるごと」か「テキストノード1文字」の
 * トークン配列に変換する
 */
function tokenizeHTML(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    const tokens = [];
    function walk(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            for (const ch of node.textContent) tokens.push({ type: 'char', char: ch });
        } else if (node.nodeName === 'RUBY') {
            tokens.push({ type: 'ruby', html: node.outerHTML });
        } else {
            node.childNodes.forEach(walk);
        }
    }
    tmp.childNodes.forEach(walk);
    return tokens;
}

function showStartupQuote() {
    const q = startupQuotesHTML[Math.floor(Math.random() * startupQuotesHTML.length)];
    const textEl   = document.getElementById("startup-text");
    const authorEl = document.getElementById("startup-author");
    textEl.innerHTML   = "";
    authorEl.innerHTML = "";
    authorEl.classList.remove("show");

    // タイプライター: 1文字ずつ遅延表示
    const tokens = tokenizeHTML(q.textHTML);
    const CHAR_DELAY = 80; // ms per token
    let delay = 300; // 初期遅延

    tokens.forEach((tok) => {
        if (tok.type === 'char') {
            const span = document.createElement("span");
            span.className = "tw-char";
            span.style.animationDelay = delay + "ms";
            span.textContent = tok.char;
            textEl.appendChild(span);
            delay += CHAR_DELAY;
        } else {
            // ruby要素: ランダムなわずかなノイズ追加
            const wrapper = document.createElement("span");
            wrapper.className = "tw-char";
            wrapper.style.animationDelay = delay + "ms";
            wrapper.innerHTML = tok.html;
            textEl.appendChild(wrapper);
            delay += CHAR_DELAY * 2; // ruby は少し長め
        }
    });

    // 著者はテキスト終了後にフェードイン
    const authorDelay = delay + 600;
    setTimeout(() => {
        authorEl.innerHTML = q.authorHTML;
        authorEl.classList.add("show");
    }, authorDelay);

    // 閉じるタイミング
    const totalLen = tokens.length;
    const waitMs = Math.max(8000, authorDelay + totalLen * 40 + 3000);
    setTimeout(() => {
        const el = document.getElementById("startup-quote");
        el.classList.add("fade-out");
        setTimeout(() => { el.style.display = "none"; }, 1200);
    }, waitMs);
}

// ────────────────────────────────────────
// 画像読み込み & ルーレット描画
// ────────────────────────────────────────
function loadImages() {
    loadedImages = new Array(items.length).fill(null);
    let loadCount = 0;
    const validCount = imageFiles.filter(f => f).length;
    if (validCount === 0) { drawRoulette(); return; }
    imageFiles.forEach((file, index) => {
        if (!file) return;
        const img = new Image();
        img.onload  = () => { loadedImages[index] = img; if (++loadCount >= validCount) drawRoulette(); };
        img.onerror = () => { if (++loadCount >= validCount) drawRoulette(); };
        img.src = file;
    });
}

function drawRoulette() {
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    const cx = W/2, cy = H/2, R = W/2 - Math.max(2, W*0.01);
    const n = items.length;
    if (n === 0) return;
    const arc = Math.PI*2/n;
    ctx.clearRect(0,0,W,H);
    items.forEach((item,i) => {
        const angle = i*arc;
        ctx.beginPath();
        ctx.fillStyle = colors[i]||"#8b0000";
        ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,R,angle,angle+arc);
        ctx.fill();
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.lineWidth = 1.5;
        ctx.moveTo(cx,cy);
        ctx.lineTo(cx+R*Math.cos(angle), cy+R*Math.sin(angle));
        ctx.stroke();
        if (loadedImages[i]?.complete && loadedImages[i].width>0) {
            ctx.save();
            ctx.translate(cx,cy); ctx.rotate(angle+arc/2);
            ctx.beginPath(); ctx.arc(R*.52,0,R*.18,0,Math.PI*2); ctx.clip();
            const s=R*.36; ctx.drawImage(loadedImages[i],R*.52-s/2,-s/2,s,s);
            ctx.restore();
        }
        ctx.save();
        ctx.translate(cx,cy); ctx.rotate(angle+arc/2);
        ctx.textAlign="right"; ctx.fillStyle="#fff";
        ctx.font=`bold ${Math.floor(R*.075)}px 'Hiragino Mincho ProN','Yu Mincho',serif`;
        ctx.strokeStyle="#1a0000"; ctx.lineWidth=3;
        const tx=R*.88;
        ctx.strokeText(item,tx,6); ctx.fillText(item,tx,6);
        ctx.restore();
    });
}

btn.addEventListener("click", startSpin);
function startSpin() {
    btn.disabled = true;
    charImg.style.animationDuration = `${arrowSpeed}s`;
    charImg.classList.add("is-spinning");
    document.getElementById("result-display").classList.remove("show");
    document.getElementById("explanation-display").classList.remove("show");
    video.currentTime = 0; video.muted = false;
    video.play().catch(()=>{});

    const extra = 360*8 + Math.random()*360;
    currentRotation += extra;
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
        btn.disabled = false;
        charImg.classList.remove("is-spinning");
        charImg.style.transform = "translateY(-50%)";

        const seg = 360/items.length;
        const adj = (currentRotation%360+360)%360;
        const idx = Math.floor(((360-adj)%360)/seg)%items.length;
        const winner = items[idx];
        const qs = getQuotes()[winner]||[{text:`${winner}が選ばれました！`,author:winner,explanation:"解説は登録されていません。"}];
        const q  = qs[Math.floor(Math.random()*qs.length)];

        if (showQuote) {
            document.getElementById("result-quote").textContent  = `「${q.text}」`;
            document.getElementById("result-author").textContent = "─ "+q.author;
            document.getElementById("result-display").classList.add("show");
        }
        if (showExplanation) {
            document.getElementById("explanation-title").textContent   = "名言解説";
            document.getElementById("explanation-content").textContent = q.explanation;
            document.getElementById("explanation-display").classList.add("show");
        }
    }, spinDuration);
}

function renderItemList() {
    const list = document.getElementById("item-list");
    list.innerHTML = "";
    items.forEach((item,idx)=>{
        const d = document.createElement("div");
        d.className = "item-entry";
        d.innerHTML = `
          <div class="item-entry-header">
            <span style="color:#fff;font-weight:bold">${idx+1}. ${item}</span>
            <button class="item-remove" data-i="${idx}">削除</button>
          </div>
          <label class="settings-label">名前</label>
          <input type="text" class="settings-input" data-i="${idx}" data-t="name" value="${item}">
          <label class="settings-label">色</label>
          <div class="color-picker-wrapper">
            <input type="color" class="color-picker" data-i="${idx}" value="${colors[idx]||'#8b0000'}">
            <span style="color:var(--cream);font-size:.8rem">${colors[idx]||'#8b0000'}</span>
          </div>
          <label class="settings-file-label">画像を変更
            <input type="file" class="settings-file-input" data-i="${idx}" accept="image/*">
          </label>`;
        list.appendChild(d);
    });
    list.querySelectorAll(".item-remove").forEach(b=>b.addEventListener("click",e=>{
        const i=+e.target.dataset.i;
        items.splice(i,1); colors.splice(i,1); imageFiles.splice(i,1); loadedImages.splice(i,1);
        renderItemList(); drawRoulette();
    }));
    list.querySelectorAll("input[data-t='name']").forEach(inp=>inp.addEventListener("input",e=>{
        items[+e.target.dataset.i]=e.target.value; drawRoulette();
    }));
    list.querySelectorAll(".color-picker").forEach(p=>p.addEventListener("input",e=>{
        const i=+e.target.dataset.i; colors[i]=e.target.value;
        e.target.nextElementSibling.textContent=e.target.value; drawRoulette();
    }));
    list.querySelectorAll("input[type=file][data-i]").forEach(inp=>inp.addEventListener("change",e=>{
        const i=+e.target.dataset.i, f=e.target.files[0]; if(!f) return;
        const img=new Image(); img.onload=()=>{ loadedImages[i]=img; drawRoulette(); };
        img.src=URL.createObjectURL(f);
    }));
}
